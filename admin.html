<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin Panel - BDS Center (Full CRUD)</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js" integrity="sha512-GsLlZN/3F2ErC5ifS5QtgpiJtWd43JWSuIgh7mbzZ8zBps+dvLusV+eNQATqgA/HdeKFVgA5v3S/cIrLF7QnIg==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
<style>
*{box-sizing:border-box;font-family:"Segoe UI",sans-serif;margin:0;padding:0;}
body{background:#f0f9f4;color:#333;}
.header{background:linear-gradient(135deg,#1f7a4f,#2fb17c);color:white;padding:25px 20px;text-align:center;}
.container{max-width:1200px;margin:30px auto;padding:0 20px;}
.login-box,.admin-content{background:white;padding:30px;border-radius:15px;box-shadow:0 10px 30px rgba(0,0,0,0.1);margin-bottom:30px;}
h2{color:#1f7a4f;margin-bottom:20px;}
h3{color:#1f7a4f;margin:15px 0 10px;}
input, textarea, select{width:100%;padding:14px;margin:12px 0;border:1px solid #ddd;border-radius:8px;font-size:16px;font-family:inherit;}
textarea{resize:vertical;}
button{background:#1f7a4f;color:white;border:none;padding:12px 20px;border-radius:8px;cursor:pointer;font-size:15px;margin-top:10px;}
button:hover{background:#166342;}
.logout-btn{background:#dc3545;}
.logout-btn:hover{background:#c82333;}
.delete-btn{background:red;margin-top:10px;}
.edit-btn{background:#ffc107;color:#333;}
.edit-btn:hover{background:#e0a800;}
.tab-buttons{display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap;}
.tab-buttons button{flex:1;}
.tab-content{display:none;}
.tab-content.active{display:block;}
.query-card{background:#f9f9f9;border-left:4px solid #1f7a4f;padding:20px;margin:15px 0;border-radius:8px;}
.back-link{display:block;text-align:center;margin-top:15px;color:#1f7a4f;text-decoration:none;}
.back-link:hover{text-decoration:underline;}
.stars{color:#f5b50a;}
.image-preview{display:flex;flex-wrap:wrap;gap:10px;margin-top:10px;}
.image-preview img{width:80px;height:80px;object-fit:cover;border-radius:8px;border:1px solid #ddd;}
.success-msg{color:green;background:#e0f2e9;padding:12px;border-radius:8px;margin-top:15px;text-align:center;}
.error-msg{color:red;background:#ffe6e6;padding:12px;border-radius:8px;margin-top:15px;text-align:center;}
.patient-table{width:100%;border-collapse:collapse;margin-top:20px;}
.patient-table th,.patient-table td{border:1px solid #ddd;padding:12px;text-align:left;}
.patient-table th{background:#1f7a4f;color:white;}
.patient-table tr:nth-child(even){background:#f9f9f9;}
.action-buttons button{margin:0 5px;padding:6px 12px;font-size:13px;}
.pdf-export-btn{background:#6c757d;margin-left:10px;}
</style>
</head>
<body>

<div class="header">
  <h1>BDS CENTER - ADMIN PANEL</h1>
  <p>Staff Access Only</p>
</div>

<div class="container">

  <!-- LOGIN -->
  <div id="loginSection" class="login-box">
    <h2>🔐 Admin Login</h2>
    <input id="adminUser" placeholder="Username">
    <input id="adminPass" type="password" placeholder="Password">
    <button onclick="login()">Login</button>
    <a href="index.html" class="back-link">← Back to Home</a>
  </div>

  <!-- ADMIN PANEL -->
  <div id="adminPanel" class="admin-content" style="display:none;">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;">
      <h2>📋 Admin Dashboard</h2>
      <button onclick="logout()" class="logout-btn">Logout</button>
    </div>

    <div class="tab-buttons">
      <button onclick="openTab('queriesTab')">Patient Queries</button>
      <button onclick="openTab('reviewsTab')">Reviews</button>
      <button onclick="openTab('patientsTab')">Manage Patients</button>
      <button onclick="openTab('allPatientsTab')">All Patients</button>
    </div>

    <!-- Queries Tab (same as original) -->
    <div id="queriesTab" class="tab-content"><div id="queryList">Loading...</div></div>
    <!-- Reviews Tab -->
    <div id="reviewsTab" class="tab-content"><div id="reviewList">Loading...</div></div>

    <!-- Add/Edit Patient Form -->
    <div id="patientsTab" class="tab-content">
      <h3 id="formTitle">➕ Add New Patient</h3>
      <input type="hidden" id="editMode" value="false">
      <div style="display:flex; gap:15px; flex-wrap:wrap;">
        <div style="flex:1;">
          <label>Registration Number *</label>
          <input type="text" id="regNo" placeholder="e.g., BDS123">
          <label>Full Name</label>
          <input type="text" id="patName">
          <label>Age</label>
          <input type="number" id="patAge">
          <label>Sex</label>
          <select id="patSex"><option>Male</option><option>Female</option><option>Other</option></select>
          <label>Problem</label>
          <textarea id="patProblem" rows="2"></textarea>
        </div>
        <div style="flex:1;">
          <label>Package</label>
          <input type="text" id="patPackage">
          <label>Diseases / Notes</label>
          <textarea id="patDiseaseNotes" rows="3"></textarea>
          <label>Images (add more will replace existing)</label>
          <input type="file" id="patPhotos" accept="image/*" multiple>
          <div id="imagePreview" class="image-preview"></div>
          <button id="savePatientBtn">💾 Save Patient</button>
          <button id="cancelEditBtn" style="background:gray; display:none;">Cancel Edit</button>
          <div id="adminPatientMsg"></div>
        </div>
      </div>
    </div>

    <!-- All Patients List with Edit/Delete/PDF -->
    <div id="allPatientsTab" class="tab-content">
      <div style="display:flex; justify-content:space-between; align-items:center;">
        <h3>📋 All Registered Patients</h3>
        <button onclick="exportAllPatientsPDF()" class="pdf-export-btn">📄 Export All as PDF</button>
      </div>
      <div id="patientsListTable" style="overflow-x:auto;">Loading patients...</div>
    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script>
// Firebase Config
const firebaseConfig = {
  apiKey: "AIzaSyDwVp7Pn3WWezbBnWC0Ps7P3OppYrWQ5Jo",
  authDomain: "bdss-671d8.firebaseapp.com",
  projectId: "bdss-671d8"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// Helper: convert files to Base64
async function filesToBase64(files) {
  return Promise.all(Array.from(files).map(file => {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = () => resolve(reader.result);
      reader.onerror = reject;
      reader.readAsDataURL(file);
    });
  }));
}

// Preview images
document.getElementById('patPhotos').addEventListener('change', function(e) {
  const preview = document.getElementById('imagePreview');
  preview.innerHTML = '';
  Array.from(e.target.files).forEach(file => {
    const reader = new FileReader();
    reader.onload = ev => {
      const img = document.createElement('img');
      img.src = ev.target.result;
      preview.appendChild(img);
    };
    reader.readAsDataURL(file);
  });
});

// LOGIN / LOGOUT (unchanged)
function login(){
  const username = document.getElementById('adminUser').value.trim();
  const password = document.getElementById('adminPass').value.trim();
  if(username==="admin" && password==="123"){
    document.getElementById('loginSection').style.display="none";
    document.getElementById('adminPanel').style.display="block";
    openTab('queriesTab');
    loadQueriesRealtime();
    loadReviewsRealtime();
    loadAllPatients(); // load patient list
  } else alert("Incorrect credentials!");
}
function logout(){
  document.getElementById('adminPanel').style.display="none";
  document.getElementById('loginSection').style.display="block";
  document.getElementById('adminPass').value="";
}
function openTab(tabId){
  document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active'));
  document.getElementById(tabId).classList.add('active');
  if(tabId === 'allPatientsTab') loadAllPatients();
}

// ========== QUERIES & REVIEWS (original functions - shortened for brevity) ==========
function loadQueriesRealtime(){
  const queryList = document.getElementById('queryList');
  queryList.innerHTML="<p>⌛ Loading queries...</p>";
  db.collection("patientQueries").orderBy("time","desc").onSnapshot(snapshot=>{
    if(snapshot.empty){ queryList.innerHTML="<p>No patient queries yet.</p>"; return; }
    let html=`<p><strong>Total Queries: ${snapshot.size}</strong></p>`;
    snapshot.forEach(doc=>{
      const data=doc.data();
      const time=data.time ? new Date(data.time.toDate()).toLocaleString() : "Unknown";
      html+=`<div class="query-card"><h3>👤 ${data.name||'No Name'}</h3><p><strong>📱 Phone:</strong> ${data.mobile||'Not provided'}</p><p><strong>💬 Query:</strong> ${data.message||'No message'}</p><p><strong>📅 Submitted:</strong> ${time}</p><button class="delete-btn" onclick="deleteQuery('${doc.id}')">Delete</button></div>`;
    });
    queryList.innerHTML=html;
  },error=>{ queryList.innerHTML=`<p style="color:red;">Error: ${error.message}</p>`; });
}
function deleteQuery(id){ if(confirm("Delete?")) db.collection("patientQueries").doc(id).delete(); }
function loadReviewsRealtime(){
  const reviewList = document.getElementById('reviewList');
  reviewList.innerHTML="<p>⌛ Loading reviews...</p>";
  db.collection("reviews").orderBy("time","desc").onSnapshot(snapshot=>{
    if(snapshot.empty){ reviewList.innerHTML="<p>No reviews yet.</p>"; return; }
    let html=`<p><strong>Total Reviews: ${snapshot.size}</strong></p>`;
    snapshot.forEach(doc=>{
      const data=doc.data();
      const time=data.time ? new Date(data.time.toDate()).toLocaleString() : "Unknown";
      html+=`<div class="query-card"><h3>👤 ${data.name||'No Name'}</h3><div class="stars">${'★'.repeat(data.rating)}${'☆'.repeat(5-data.rating)}</div><p>${data.review||'No review text'}</p><p><strong>📅 Submitted:</strong> ${time}</p><button class="delete-btn" onclick="deleteReview('${doc.id}')">Delete</button></div>`;
    });
    reviewList.innerHTML=html;
  },error=>{ reviewList.innerHTML=`<p style="color:red;">Error: ${error.message}</p>`; });
}
function deleteReview(id){ if(confirm("Delete?")) db.collection("reviews").doc(id).delete(); }

// ========== PATIENT CRUD ==========
let currentEditRegNo = null;

async function savePatient() {
  const msgDiv = document.getElementById('adminPatientMsg');
  let regNo = document.getElementById('regNo').value.trim().toUpperCase(); // store uppercase for case-insensitive
  if(!regNo) { msgDiv.innerHTML = '<div class="error-msg">❌ Registration Number required</div>'; return; }
  
  const name = document.getElementById('patName').value;
  const age = document.getElementById('patAge').value;
  const sex = document.getElementById('patSex').value;
  const problem = document.getElementById('patProblem').value;
  const packageVal = document.getElementById('patPackage').value;
  const diseaseNotes = document.getElementById('patDiseaseNotes').value;
  const files = document.getElementById('patPhotos').files;
  
  let imagesBase64 = [];
  if(files.length > 0) {
    try { imagesBase64 = await filesToBase64(files); } 
    catch(err) { msgDiv.innerHTML = `<div class="error-msg">❌ Error reading images: ${err.message}</div>`; return; }
  }
  
  const patientData = {
    name, age, sex, problem, package: packageVal, diseaseNotes,
    lastUpdated: firebase.firestore.FieldValue.serverTimestamp()
  };
  if(imagesBase64.length) patientData.images = imagesBase64;
  
  try {
    await db.collection("patients").doc(regNo).set(patientData, { merge: true });
    msgDiv.innerHTML = `<div class="success-msg">✅ Patient ${regNo} saved successfully!</div>`;
    clearForm();
    loadAllPatients();
    setTimeout(() => msgDiv.innerHTML = '', 3000);
  } catch(err) { msgDiv.innerHTML = `<div class="error-msg">❌ Error: ${err.message}</div>`; }
}

async function deletePatient(regNo) {
  if(confirm(`Delete patient ${regNo} permanently?`)) {
    try {
      await db.collection("patients").doc(regNo).delete();
      loadAllPatients();
      document.getElementById('adminPatientMsg').innerHTML = `<div class="success-msg">✅ Patient ${regNo} deleted.</div>`;
      setTimeout(() => document.getElementById('adminPatientMsg').innerHTML = '', 2000);
    } catch(err) { alert(err.message); }
  }
}

async function editPatient(regNo) {
  // Load patient data into the add/edit form
  const doc = await db.collection("patients").doc(regNo).get();
  if(doc.exists) {
    const data = doc.data();
    document.getElementById('regNo').value = regNo;
    document.getElementById('patName').value = data.name || '';
    document.getElementById('patAge').value = data.age || '';
    document.getElementById('patSex').value = data.sex || 'Male';
    document.getElementById('patProblem').value = data.problem || '';
    document.getElementById('patPackage').value = data.package || '';
    document.getElementById('patDiseaseNotes').value = data.diseaseNotes || '';
    document.getElementById('editMode').value = 'true';
    document.getElementById('cancelEditBtn').style.display = 'inline-block';
    document.getElementById('formTitle').innerHTML = '✏️ Edit Patient';
    // Clear image preview
    document.getElementById('imagePreview').innerHTML = '';
    document.getElementById('patPhotos').value = '';
    // Switch to patients tab
    openTab('patientsTab');
  } else { alert("Patient not found"); }
}

function cancelEdit() {
  clearForm();
  document.getElementById('editMode').value = 'false';
  document.getElementById('cancelEditBtn').style.display = 'none';
  document.getElementById('formTitle').innerHTML = '➕ Add New Patient';
}

function clearForm() {
  document.getElementById('regNo').value = '';
  document.getElementById('patName').value = '';
  document.getElementById('patAge').value = '';
  document.getElementById('patSex').value = 'Male';
  document.getElementById('patProblem').value = '';
  document.getElementById('patPackage').value = '';
  document.getElementById('patDiseaseNotes').value = '';
  document.getElementById('patPhotos').value = '';
  document.getElementById('imagePreview').innerHTML = '';
}

// Load all patients into table with actions
async function loadAllPatients() {
  const container = document.getElementById('patientsListTable');
  container.innerHTML = '<p>Loading patients...</p>';
  try {
    const snapshot = await db.collection("patients").orderBy("lastUpdated", "desc").get();
    if(snapshot.empty) { container.innerHTML = '<p>No patients added yet.</p>'; return; }
    let html = `<table class="patient-table">
      <thead><tr><th>Reg No</th><th>Name</th><th>Age/Sex</th><th>Package</th><th>Last Updated</th><th>Actions</th></tr></thead><tbody>`;
    snapshot.forEach(doc => {
      const data = doc.data();
      const ageSex = `${data.age || '?'} / ${data.sex || '?'}`;
      const lastUp = data.lastUpdated ? new Date(data.lastUpdated.toDate()).toLocaleDateString() : '—';
      html += `<tr>
        <td>${doc.id}</td>
        <td>${data.name || '—'}</td>
        <td>${ageSex}</td>
        <td>${data.package || '—'}</td>
        <td>${lastUp}</td>
        <td class="action-buttons">
          <button class="edit-btn" onclick="editPatient('${doc.id}')">✏️ Edit</button>
          <button class="delete-btn" onclick="deletePatient('${doc.id}')">🗑️ Delete</button>
          <button class="pdf-export-btn" onclick="exportSinglePatientPDF('${doc.id}')">📄 PDF</button>
        </td>
      </tr>`;
    });
    html += `</tbody></table>`;
    container.innerHTML = html;
  } catch(err) { container.innerHTML = `<div class="error-msg">Error: ${err.message}</div>`; }
}

// PDF Export for single patient
async function exportSinglePatientPDF(regNo) {
  const docSnap = await db.collection("patients").doc(regNo).get();
  if(!docSnap.exists) { alert("Patient not found"); return; }
  const data = docSnap.data();
  const imagesHtml = (data.images || []).map(img => `<img src="${img}" style="width:150px; margin:5px;">`).join('');
  const content = `
    <div style="font-family: sans-serif; padding:20px;">
      <h1 style="color:#1f7a4f;">BDS Ayurvedic Physio Yoga Centre</h1>
      <h2>Patient Health Record</h2>
      <p><strong>Registration No:</strong> ${regNo}</p>
      <p><strong>Name:</strong> ${data.name || '—'}</p>
      <p><strong>Age:</strong> ${data.age || '—'}</p>
      <p><strong>Sex:</strong> ${data.sex || '—'}</p>
      <p><strong>Chief Problem:</strong> ${data.problem || '—'}</p>
      <p><strong>Package:</strong> ${data.package || '—'}</p>
      <p><strong>Doctor's Notes:</strong><br>${(data.diseaseNotes || '—').replace(/\n/g,'<br>')}</p>
      <h3>Images</h3>
      ${imagesHtml || '<p>No images uploaded.</p>'}
      <hr>
      <p>Generated on ${new Date().toLocaleString()}</p>
    </div>
  `;
  const opt = { margin: 0.5, filename: `Patient_${regNo}.pdf`, image: { type: 'jpeg', quality: 0.98 }, html2canvas: { scale: 2 }, jsPDF: { unit: 'in', format: 'a4', orientation: 'portrait' } };
  html2pdf().set(opt).from(content).save();
}

async function exportAllPatientsPDF() {
  const snapshot = await db.collection("patients").get();
  if(snapshot.empty) { alert("No patients to export"); return; }
  let allHtml = `<div style="font-family: sans-serif; padding:20px;"><h1>BDS Centre - All Patients List</h1><p>Generated: ${new Date().toLocaleString()}</p>`;
  snapshot.forEach(doc => {
    const data = doc.data();
    allHtml += `<div style="border:1px solid #ccc; margin-bottom:20px; padding:15px; page-break-inside:avoid;">
      <h3>${data.name || 'No Name'} (${doc.id})</h3>
      <p><strong>Age/Sex:</strong> ${data.age || '?'}/${data.sex || '?'}</p>
      <p><strong>Problem:</strong> ${data.problem || '—'}</p>
      <p><strong>Package:</strong> ${data.package || '—'}</p>
      <p><strong>Notes:</strong> ${data.diseaseNotes || '—'}</p>
    </div>`;
  });
  allHtml += `</div>`;
  const opt = { margin: 0.5, filename: `All_Patients.pdf`, image: { type: 'jpeg', quality: 0.98 }, html2canvas: { scale: 2 }, jsPDF: { unit: 'in', format: 'a4', orientation: 'portrait' } };
  html2pdf().set(opt).from(allHtml).save();
}

document.getElementById('savePatientBtn').addEventListener('click', savePatient);
document.getElementById('cancelEditBtn').addEventListener('click', cancelEdit);
</script>
</body>
</html>
