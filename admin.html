<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin Panel - BDS Center</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
*{box-sizing:border-box;font-family:"Segoe UI",sans-serif;margin:0;padding:0;}
body{background:#f0f9f4;color:#333;}
.header{background:linear-gradient(135deg,#1f7a4f,#2fb17c);color:white;padding:25px 20px;text-align:center;}
.container{max-width:1000px;margin:30px auto;padding:0 20px;}
.login-box,.admin-content{background:white;padding:30px;border-radius:15px;box-shadow:0 10px 30px rgba(0,0,0,0.1);margin-bottom:30px;}
h2{color:#1f7a4f;margin-bottom:20px;}
h3{color:#1f7a4f;margin:15px 0 10px;}
input, textarea, select{width:100%;padding:14px;margin:12px 0;border:1px solid #ddd;border-radius:8px;font-size:16px;font-family:inherit;}
textarea{resize:vertical;}
button{background:#1f7a4f;color:white;border:none;padding:12px 20px;border-radius:8px;cursor:pointer;font-size:15px;margin-top:10px;}
button:hover{background:#166342;}
.logout-btn{background:#dc3545;}
.logout-btn:hover{background:#c82333;}
.delete-btn{background:red;margin-top:10px;}
.tab-buttons{display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap;}
.tab-buttons button{flex:1;}
.tab-content{display:none;}
.tab-content.active{display:block;}
.query-card{background:#f9f9f9;border-left:4px solid #1f7a4f;padding:20px;margin:15px 0;border-radius:8px;}
.back-link{display:block;text-align:center;margin-top:15px;color:#1f7a4f;text-decoration:none;}
.back-link:hover{text-decoration:underline;}
.stars{color:#f5b50a;}
.image-preview{display:flex;flex-wrap:wrap;gap:10px;margin-top:10px;}
.image-preview img{width:80px;height:80px;object-fit:cover;border-radius:8px;border:1px solid #ddd;}
</style>
</head>
<body>

<div class="header">
  <h1>BDS CENTER - ADMIN PANEL</h1>
  <p>Staff Access Only</p>
</div>

<div class="container">

  <!-- LOGIN SECTION -->
  <div id="loginSection" class="login-box">
    <h2>🔐 Admin Login</h2>
    <input id="adminUser" placeholder="Username">
    <input id="adminPass" type="password" placeholder="Password">
    <button onclick="login()">Login</button>
    <a href="index.html" class="back-link">← Back to Home</a>
  </div>

  <!-- ADMIN PANEL -->
  <div id="adminPanel" class="admin-content" style="display:none;">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;">
      <h2>📋 Admin Dashboard</h2>
      <button onclick="logout()" class="logout-btn">Logout</button>
    </div>

    <!-- Tabs -->
    <div class="tab-buttons">
      <button onclick="openTab('queriesTab')">Patient Queries</button>
      <button onclick="openTab('reviewsTab')">Reviews</button>
      <button onclick="openTab('patientsTab')">Add Patient</button>
    </div>

    <!-- Patient Queries Tab (original) -->
    <div id="queriesTab" class="tab-content">
      <div id="queryList"><p>Loading queries...</p></div>
    </div>

    <!-- Reviews Tab (original) -->
    <div id="reviewsTab" class="tab-content">
      <div id="reviewList"><p>Loading reviews...</p></div>
    </div>

    <!-- Add Patient Tab (multiple images) -->
    <div id="patientsTab" class="tab-content">
      <h3>➕ Add New Patient Record</h3>
      <p>Fill all details. Registration Number will be used by patient to view their record. You can select multiple images.</p>
      <div style="display:flex; gap:15px; flex-wrap:wrap;">
        <div style="flex:1;">
          <label>Registration Number *</label>
          <input type="text" id="regNo" placeholder="e.g., BDS123">
          <label>Full Name</label>
          <input type="text" id="patName">
          <label>Age</label>
          <input type="number" id="patAge">
          <label>Sex</label>
          <select id="patSex"><option>Male</option><option>Female</option><option>Other</option></select>
          <label>Problem (Chief complaint)</label>
          <textarea id="patProblem" rows="2"></textarea>
        </div>
        <div style="flex:1;">
          <label>Package</label>
          <input type="text" id="patPackage" placeholder="e.g., 7-day Panchakarma">
          <label>Diseases / Short Notes</label>
          <textarea id="patDiseaseNotes" rows="3" placeholder="Medical history, diagnosis..."></textarea>
          <label>Upload Multiple Images (CTRL+click to select several)</label>
          <input type="file" id="patPhotos" accept="image/*" multiple>
          <div id="imagePreview" class="image-preview"></div>
          <button id="savePatientBtn">💾 Save Patient Record</button>
          <div id="adminPatientMsg"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>

<script>
// Firebase config
const firebaseConfig = {
  apiKey: "AIzaSyDwVp7Pn3WWezbBnWC0Ps7P3OppYrWQ5Jo",
  authDomain: "bdss-671d8.firebaseapp.com",
  projectId: "bdss-671d8",
  storageBucket: "bdss-671d8.appspot.com"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const storage = firebase.storage();

// Image preview on file selection
document.getElementById('patPhotos').addEventListener('change', function(e) {
  const preview = document.getElementById('imagePreview');
  preview.innerHTML = '';
  const files = Array.from(e.target.files);
  files.forEach(file => {
    const reader = new FileReader();
    reader.onload = function(ev) {
      const img = document.createElement('img');
      img.src = ev.target.result;
      preview.appendChild(img);
    };
    reader.readAsDataURL(file);
  });
});

// LOGIN (original)
function login(){
  const username = document.getElementById('adminUser').value.trim();
  const password = document.getElementById('adminPass').value.trim();
  if(username==="admin" && password==="123"){
    document.getElementById('loginSection').style.display="none";
    document.getElementById('adminPanel').style.display="block";
    openTab('queriesTab');
    loadQueriesRealtime();
    loadReviewsRealtime();
  } else {
    alert("Incorrect username or password!");
  }
}

function logout(){
  document.getElementById('adminPanel').style.display="none";
  document.getElementById('loginSection').style.display="block";
  document.getElementById('adminPass').value="";
}

function openTab(tabId){
  document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active'));
  document.getElementById(tabId).classList.add('active');
}

// LOAD QUERIES (original)
function loadQueriesRealtime(){
  const queryList = document.getElementById('queryList');
  queryList.innerHTML="<p>⌛ Loading queries...</p>";
  db.collection("patientQueries").orderBy("time","desc")
    .onSnapshot(snapshot=>{
      if(snapshot.empty){ queryList.innerHTML="<p>No patient queries yet.</p>"; return; }
      let html=`<p><strong>Total Queries: ${snapshot.size}</strong></p>`;
      snapshot.forEach(doc=>{
        const data=doc.data();
        const time=data.time ? new Date(data.time.toDate()).toLocaleString() : "Unknown";
        html+=`
          <div class="query-card">
            <h3>👤 ${data.name||'No Name'}</h3>
            <p><strong>📱 Phone:</strong> ${data.mobile||'Not provided'}</p>
            <p><strong>💬 Query:</strong> ${data.message||'No message'}</p>
            <p><strong>📅 Submitted:</strong> ${time}</p>
            <button class="delete-btn" onclick="deleteQuery('${doc.id}')">Delete</button>
          </div>
        `;
      });
      queryList.innerHTML=html;
    },error=>{
      queryList.innerHTML=`<p style="color:red;">Error: ${error.message}</p>`;
    });
}

function deleteQuery(id){
  if(confirm("Delete this query?")){
    db.collection("patientQueries").doc(id).delete();
  }
}

// LOAD REVIEWS (original)
function loadReviewsRealtime(){
  const reviewList = document.getElementById('reviewList');
  reviewList.innerHTML="<p>⌛ Loading reviews...</p>";
  db.collection("reviews").orderBy("time","desc")
    .onSnapshot(snapshot=>{
      if(snapshot.empty){ reviewList.innerHTML="<p>No reviews yet.</p>"; return; }
      let html=`<p><strong>Total Reviews: ${snapshot.size}</strong></p>`;
      snapshot.forEach(doc=>{
        const data=doc.data();
        const time=data.time ? new Date(data.time.toDate()).toLocaleString() : "Unknown";
        html+=`
          <div class="query-card">
            <h3>👤 ${data.name||'No Name'}</h3>
            <div class="stars">${'★'.repeat(data.rating)}${'☆'.repeat(5-data.rating)}</div>
            <p>${data.review||'No review text'}</p>
            <p><strong>📅 Submitted:</strong> ${time}</p>
            <button class="delete-btn" onclick="deleteReview('${doc.id}')">Delete</button>
          </div>
        `;
      });
      reviewList.innerHTML=html;
    },error=>{
      reviewList.innerHTML=`<p style="color:red;">Error: ${error.message}</p>`;
    });
}

function deleteReview(id){
  if(confirm("Delete this review?")){
    db.collection("reviews").doc(id).delete();
  }
}

// ADD PATIENT with multiple images
async function savePatientToFirestore() {
  const regNo = document.getElementById('regNo').value.trim();
  if(!regNo) {
    document.getElementById('adminPatientMsg').innerHTML = '<div style="color:red;">❌ Registration Number is required</div>';
    return;
  }
  const name = document.getElementById('patName').value;
  const age = document.getElementById('patAge').value;
  const sex = document.getElementById('patSex').value;
  const problem = document.getElementById('patProblem').value;
  const packageVal = document.getElementById('patPackage').value;
  const diseaseNotes = document.getElementById('patDiseaseNotes').value;
  const files = document.getElementById('patPhotos').files;
  
  let photoURLs = [];
  if(files.length > 0) {
    const uploadPromises = Array.from(files).map(async (file, index) => {
      const fileExt = file.name.split('.').pop();
      const fileName = `${regNo}_${Date.now()}_${index}.${fileExt}`;
      const storageRef = storage.ref(`patient_photos/${fileName}`);
      await storageRef.put(file);
      return await storageRef.getDownloadURL();
    });
    photoURLs = await Promise.all(uploadPromises);
  }
  
  const patientData = {
    name, age, sex, problem, package: packageVal, diseaseNotes,
    photoURLs: photoURLs,  // array of image URLs
    lastUpdated: firebase.firestore.FieldValue.serverTimestamp()
  };
  
  try {
    await db.collection("patients").doc(regNo).set(patientData, { merge: true });
    document.getElementById('adminPatientMsg').innerHTML = `<div style="color:green;">✅ Patient ${regNo} saved with ${photoURLs.length} image(s)!</div>`;
    // Clear form
    document.getElementById('patName').value = '';
    document.getElementById('patAge').value = '';
    document.getElementById('patSex').value = 'Male';
    document.getElementById('patProblem').value = '';
    document.getElementById('patPackage').value = '';
    document.getElementById('patDiseaseNotes').value = '';
    document.getElementById('patPhotos').value = '';
    document.getElementById('imagePreview').innerHTML = '';
    setTimeout(()=> document.getElementById('adminPatientMsg').innerHTML = '', 3000);
  } catch(err) {
    document.getElementById('adminPatientMsg').innerHTML = `<div style="color:red;">❌ Error: ${err.message}</div>`;
  }
}

document.getElementById('savePatientBtn').addEventListener('click', savePatientToFirestore);
</script>
</body>
</html>
