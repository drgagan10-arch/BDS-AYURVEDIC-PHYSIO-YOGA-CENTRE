<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin - Patient Queries | BDS Center</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #e9f7f0, #ffffff);
      min-height: 100vh;
    }
    .login-container, .admin-container {
      max-width: 800px;
      margin: 80px auto;
      padding: 20px;
    }
    .card {
      background: white;
      border-radius: 28px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.08);
      padding: 40px;
    }
    h2 {
      color: #1f7a4f;
      margin-bottom: 20px;
      text-align: center;
    }
    input {
      width: 100%;
      padding: 14px 16px;
      margin-bottom: 20px;
      border-radius: 50px;
      border: 1px solid #ccc;
      font-size: 1rem;
    }
    button {
      background: #1f7a4f;
      color: white;
      padding: 12px 28px;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      font-size: 1rem;
      width: 100%;
      transition: 0.3s;
    }
    button:hover {
      background: #134e36;
      transform: translateY(-2px);
    }
    .error {
      color: red;
      margin-top: 10px;
      text-align: center;
    }
    .query-card {
      background: #f3fff7;
      padding: 15px 20px;
      border-radius: 20px;
      margin-bottom: 15px;
      border-left: 5px solid #1f7a4f;
    }
    .query-card strong {
      color: #1f7a4f;
    }
    .delete-btn {
      background: #ff4444;
      padding: 5px 15px;
      font-size: 0.8rem;
      width: auto;
      margin-top: 10px;
    }
    .delete-btn:hover {
      background: #cc0000;
    }
    .logout-btn {
      background: #666;
      margin-bottom: 20px;
      width: auto;
      padding: 8px 20px;
    }
    .header-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }
    footer {
      text-align: center;
      margin-top: 40px;
      color: #666;
    }
  </style>
</head>
<body>

<div class="login-container" id="loginContainer">
  <div class="card">
    <h2>🔐 Admin Login</h2>
    <input type="text" id="username" placeholder="Username" autocomplete="off">
    <input type="password" id="password" placeholder="Password">
    <button onclick="login()">Login</button>
    <p id="loginError" class="error"></p>
  </div>
</div>

<div class="admin-container" id="adminContainer" style="display: none;">
  <div class="card">
    <div class="header-bar">
      <h2>📋 Patient Queries</h2>
      <button class="logout-btn" onclick="logout()">Logout</button>
    </div>
    <div id="queriesList">Loading...</div>
  </div>
  <footer>© 2026 BDS Physiotherapy, Yoga & Ayurvedic Center</footer>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script>
  // Firebase configuration (same as your website)
  const firebaseConfig = {
    apiKey: "AIzaSyDwVp7Pn3WWezbBnWC0Ps7P3OppYrWQ5Jo",
    authDomain: "bdss-671d8.firebaseapp.com",
    projectId: "bdss-671d8"
  };
  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();

  let unsubscribeQueries = null;

  function login() {
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value.trim();
    const errorDiv = document.getElementById('loginError');
    
    if (username === 'admin' && password === '123') {
      document.getElementById('loginContainer').style.display = 'none';
      document.getElementById('adminContainer').style.display = 'block';
      loadQueries();
    } else {
      errorDiv.innerText = '❌ Invalid username or password';
    }
  }

  function logout() {
    if (unsubscribeQueries) {
      unsubscribeQueries();
    }
    document.getElementById('loginContainer').style.display = 'block';
    document.getElementById('adminContainer').style.display = 'none';
    document.getElementById('username').value = '';
    document.getElementById('password').value = '';
    document.getElementById('loginError').innerText = '';
  }

  function loadQueries() {
    const container = document.getElementById('queriesList');
    container.innerHTML = 'Loading queries...';
    
    unsubscribeQueries = db.collection('patientQueries')
      .orderBy('time', 'desc')
      .onSnapshot(snapshot => {
        if (snapshot.empty) {
          container.innerHTML = '<p>No patient queries yet.</p>';
          return;
        }
        
        let html = '';
        snapshot.forEach(doc => {
          const q = doc.data();
          const time = q.time?.toDate?.().toLocaleString() || 'Unknown';
          html += `
            <div class="query-card">
              <strong>📛 Name:</strong> ${escapeHtml(q.name)}<br>
              <strong>📞 Mobile:</strong> ${escapeHtml(q.mobile)}<br>
              <strong>💬 Message:</strong> ${escapeHtml(q.message)}<br>
              <strong>🕒 Time:</strong> ${time}<br>
              <button class="delete-btn" onclick="deleteQuery('${doc.id}')">Delete</button>
            </div>
          `;
        });
        container.innerHTML = html;
      }, error => {
        console.error(error);
        container.innerHTML = '<p>Error loading queries. Please refresh.</p>';
      });
  }

  async function deleteQuery(id) {
    if (confirm('Are you sure you want to delete this query?')) {
      try {
        await db.collection('patientQueries').doc(id).delete();
        // No need to refresh manually – Firestore snapshot will update automatically
      } catch (err) {
        alert('Error deleting: ' + err.message);
      }
    }
  }

  function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, function(m) {
      if (m === '&') return '&amp;';
      if (m === '<') return '&lt;';
      if (m === '>') return '&gt;';
      return m;
    });
  }
</script>
</body>
</html>
